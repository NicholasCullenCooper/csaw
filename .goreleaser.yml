version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/csaw
    binary: csaw
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: csaw
    binaries:
      - csaw
    homepage: https://github.com/NicholasCullenCooper/csaw
    description: "Mount, not install. AI workspace configuration from git-backed registries."
    repository:
      owner: NicholasCullenCooper
      name: homebrew-tap
      branch: main
      token: "{{ .Env.PUBLISH_TOKEN }}"
    directory: Casks
    commit_msg_template: "csaw {{ .Tag }}"
    commit_author:
      name: csaw-release-bot
      email: noreply@csaw.dev

scoops:
  - name: csaw
    homepage: https://github.com/NicholasCullenCooper/csaw
    description: "Mount, not install. AI workspace configuration from git-backed registries."
    license: MIT
    repository:
      owner: NicholasCullenCooper
      name: scoop-bucket
      branch: main
      token: "{{ .Env.PUBLISH_TOKEN }}"
    commit_msg_template: "csaw {{ .Tag }}"
    commit_author:
      name: csaw-release-bot
      email: noreply@csaw.dev

release:
  github:
    owner: NicholasCullenCooper
    name: csaw
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
