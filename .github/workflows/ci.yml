name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Disable CRLF conversion
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Validate docs
        shell: bash
        run: ./scripts/check_docs.sh

      - name: Verify generated docs are up to date
        shell: bash
        run: |
          go generate ./internal/mount/...
          if ! git diff --quiet -- docs/reference/tool-projection.md; then
            echo "::error::docs/reference/tool-projection.md is out of date. Run: go generate ./internal/mount/..."
            git diff -- docs/reference/tool-projection.md
            exit 1
          fi
